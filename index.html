<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>資格試験対策</title>

<style>
    body{
        margin:0;
        padding:0;
        background:#f5f5f5;
        font-family:"Hiragino Sans","Yu Gothic",sans-serif;
        display:flex;
        justify-content:center;
    }

    .app-container{
        width:390px;
        min-height:100vh;
        background:white;
        padding:20px;
        box-sizing:border-box;
    }

    .main-box{
        border:2px solid #888;
        padding:20px;
        min-height:680px;
    }

    .title{
        font-size:28px;
        margin-bottom:50px;
        color:#333;
    }

    .menu-grid{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:40px 30px;
        justify-items:center;
        margin-bottom:60px;
    }

    .menu-btn{
        width:95px;
        height:95px;
        border:2px solid #888;
        background:white;
        font-size:18px;
        color:#333;
        cursor:pointer;
        display:flex;
        align-items:center;
        justify-content:center;
        text-align:center;
        line-height:1.5;
        transition:0.2s;
    }

    .menu-btn:hover{
        background:#f0f0f0;
    }

    .description{
        margin-top:20px;
        font-size:18px;
        color:#333;
        line-height:2;
    }

    .description-title{
        margin-bottom:10px;
        font-weight:bold;
    }

    ul{
        margin:0;
        padding-left:25px;
    }
</style>
</head>

<body>

<div class="app-container">

    <div class="main-box">

        <div class="title">
            資格試験対策
        </div>

        <div class="menu-grid">

            <button class="menu-btn">
                問題集
            </button>

            <button class="menu-btn">
                学習
            </button>

            <button class="menu-btn">
                問題集<br>設定
            </button>

            <button class="menu-btn">
                問題集<br>共有
            </button>

            <button class="menu-btn">
                問題集<br>生成
            </button>

            <button class="menu-btn">
                更新
            </button>

        </div>

        <div class="description">

            <div class="description-title">
                応用想定
            </div>

            <ul>
                <li>言語学習テスト</li>
                <li>資格学習試験対策</li>
                <li>セキュリティテスト</li>
            </ul>

        </div>

    </div>

</div>

</body>
</html>
